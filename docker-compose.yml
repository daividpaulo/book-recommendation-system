name: recommendations-stack

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_recommendations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - book-recommendations-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - book-recommendations-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - book-recommendations-net

  recommendations-api:
    build: ./recommendations-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: book_recommendations
      ML_SERVICE_URL: http://ml-recommendations-api:5000
    depends_on:
      postgres:
        condition: service_healthy
      ml-recommendations-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - book-recommendations-net

  ml-recommendations-api:
    build: ./ml-recommendations-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MODEL_PATH: /tmp/saved_models
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ml-models
    depends_on:
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=2); urllib.request.urlopen('http://qdrant:6333/healthz', timeout=2)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - book-recommendations-net

  recommendations-ui:
    build: ./recommendations-ui
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      API_URL: http://recommendations-api:8080
    depends_on:
      recommendations-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - book-recommendations-net

volumes:
  postgres_data:
  qdrant_data:
  minio_data:

networks:
  book-recommendations-net:
    driver: bridge
